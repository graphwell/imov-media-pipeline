# docker/nginx/sites/imov.conf
# Reverse proxy para IMOV MEDIA PIPELINE AI

# ─── Admin Frontend ───────────────────────────────────────────
server {
    listen 80;
    server_name admin.imov.somar.ia.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.imov.somar.ia.br;

    ssl_certificate     /etc/letsencrypt/live/admin.imov.somar.ia.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.imov.somar.ia.br/privkey.pem;

    client_max_body_size 500M;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── API Backend ─────────────────────────────────────────────
server {
    listen 80;
    server_name api.imov.somar.ia.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.imov.somar.ia.br;

    ssl_certificate     /etc/letsencrypt/live/api.imov.somar.ia.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.imov.somar.ia.br/privkey.pem;

    client_max_body_size 500M;

    # WebSocket
    location /ws {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # API REST
    location / {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}

# ─── Bull Board (monitoramento de filas) ─────────────────────
server {
    listen 443 ssl http2;
    server_name queues.imov.somar.ia.br;

    ssl_certificate     /etc/letsencrypt/live/queues.imov.somar.ia.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/queues.imov.somar.ia.br/privkey.pem;

    # Autenticação básica (proteger acesso)
    auth_basic "Queues Monitor";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://bull-board:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
