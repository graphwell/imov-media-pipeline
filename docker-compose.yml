# ─── IMOV MEDIA PIPELINE AI ───────────────────────────────────────────────────
# docker compose up -d          → sobe tudo
# docker compose logs -f api    → ver logs da API
# docker compose down -v        → derruba e apaga volumes

services:

  # ═══════════════════════════════════════════════════════════════
  # BANCO DE DADOS
  # ═══════════════════════════════════════════════════════════════

  postgres:
    image: pgvector/pgvector:pg16
    container_name: imov_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: imov_media
      POSTGRES_USER: imov
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imov -d imov_media"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: imov_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-password}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # SERVIÇOS NODE.JS
  # ═══════════════════════════════════════════════════════════════

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: imov_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://imov:${DB_PASSWORD:-password}@postgres:5432/imov_media
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-placeholder}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-placeholder}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-placeholder}
      R2_BUCKET: ${R2_BUCKET:-imov-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-https://media.imov.somar.ia.br}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-placeholder}
      MAIN_SITE_URL: ${MAIN_SITE_URL:-https://imov.somar.ia.br}
      MAIN_SITE_API_KEY: ${MAIN_SITE_API_KEY:-placeholder}
      CORS_ORIGINS: "http://localhost:3000,https://admin.imov.somar.ia.br"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - processing_tmp:/tmp/media-processing
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm prisma migrate deploy && pnpm start:dev"

  importer:
    build:
      context: .
      dockerfile: apps/importer/Dockerfile
      target: development
    container_name: imov_importer
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://imov:${DB_PASSWORD:-password}@postgres:5432/imov_media
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-placeholder}
      DROPBOX_APP_KEY: ${DROPBOX_APP_KEY:-placeholder}
      DROPBOX_APP_SECRET: ${DROPBOX_APP_SECRET:-placeholder}
      TMP_DIR: /tmp/media-processing
      MAX_CONCURRENT_DOWNLOADS: 5
    volumes:
      - ./apps/importer:/app
      - /app/node_modules
      - processing_tmp:/tmp/media-processing
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm dev

  publisher:
    build:
      context: ./apps/publisher
      dockerfile: Dockerfile
      target: development
    container_name: imov_publisher
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://imov:${DB_PASSWORD:-password}@postgres:5432/imov_media
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-placeholder}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-placeholder}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-placeholder}
      R2_BUCKET: ${R2_BUCKET:-imov-media}
      MAIN_SITE_URL: ${MAIN_SITE_URL:-https://imov.somar.ia.br}
      MAIN_SITE_API_KEY: ${MAIN_SITE_API_KEY:-placeholder}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-placeholder}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-placeholder}
    volumes:
      - ./apps/publisher:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm dev

  # ═══════════════════════════════════════════════════════════════
  # SERVIÇOS PYTHON
  # ═══════════════════════════════════════════════════════════════

  media-processor:
    build:
      context: ./apps/media-processor
      dockerfile: Dockerfile
    container_name: imov_media_processor
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      DATABASE_URL: postgresql://imov:${DB_PASSWORD:-password}@postgres:5432/imov_media
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-placeholder}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-placeholder}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-placeholder}
      R2_BUCKET: ${R2_BUCKET:-imov-media}
      R2_ENDPOINT_URL: https://${R2_ACCOUNT_ID:-placeholder}.r2.cloudflarestorage.com
      TMP_DIR: /tmp/media-processing
      PYTHONUNBUFFERED: 1
    volumes:
      - processing_tmp:/tmp/media-processing
    depends_on:
      redis:
        condition: service_healthy

  ai-classifier:
    build:
      context: ./apps/ai-classifier
      dockerfile: Dockerfile
    container_name: imov_ai_classifier
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      TMP_DIR: /tmp/media-processing
      MAX_CONCURRENT_AI: 3
      PYTHONUNBUFFERED: 1
    volumes:
      - processing_tmp:/tmp/media-processing
    depends_on:
      redis:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND
  # ═══════════════════════════════════════════════════════════════

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: imov_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_SITE_URL: https://imov.somar.ia.br
      NEXT_PUBLIC_MEDIA_URL: ${R2_PUBLIC_URL:-https://media.imov.somar.ia.br}
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: pnpm dev

  # ═══════════════════════════════════════════════════════════════
  # MONITORAMENTO
  # ═══════════════════════════════════════════════════════════════

  bull-board:
    image: deadly0/bull-board:latest
    container_name: imov_bull_board
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      BULL_PREFIX: bull
    ports:
      - "3030:3000"
    depends_on:
      redis:
        condition: service_healthy

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: imov_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-password}"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - debug

  adminer:
    image: adminer:latest
    container_name: imov_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - debug

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  processing_tmp:
    driver: local

networks:
  default:
    name: imov_network
    driver: bridge
